name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Debug - List all built files
        run: |
          echo "=== Contents of dist/ ==="
          ls -la dist/
          echo "=== Check if index.html exists ==="
          if [ -f "dist/index.html" ]; then
            echo "✅ index.html exists!"
          else
            echo "❌ index.html NOT found!"
          fi
          echo "=== Check for _astro folder ==="
          if [ -d "dist/_astro" ]; then
            echo "✅ _astro folder exists!"
          else
            echo "❌ _astro folder NOT found!"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
